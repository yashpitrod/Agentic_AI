services:
  - type: web
    name: agentic-ai-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: REVIEWS_DB_PATH
        value: /tmp/reviews.db
      - key: GEMINI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
